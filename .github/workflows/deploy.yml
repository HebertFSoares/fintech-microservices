name: CI/CD - Fintech

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 608420805829.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - gateway
          - AuthService
          - AccountService
          - transferService
          - notificationService

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build
        run: |
          docker build -t $ECR_REGISTRY/fintech/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}

      - name: Push
        run: |
          docker push $ECR_REGISTRY/fintech/${{ matrix.service }}:${{ github.sha }}