apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: fintech
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "256Mi"