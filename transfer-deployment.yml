apiVersion: apps/v1
kind: Deployment
metadata:
  name: transfer-service
  namespace: fintech
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transfer-service
  template:
    metadata:
      labels:
        app: transfer-service
    spec:
      containers:
        - name: transfer-service
          image: 608420805829.dkr.ecr.us-east-1.amazonaws.com/fintech/transfer-service:918ad3c2628f09977c6e4ee40d156958c0ffcfa3
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: fintech-config
            - secretRef:
                name: fintech-secret

---
apiVersion: v1
kind: Service
metadata:
  name: transfer-service
  namespace: fintech
spec:
  selector:
    app: transfer-service
  ports:
    - port: 8083
      targetPort: 8083