server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**, /api/v1/signup

        - id: account-service
          uri: http://account-service:8082
          predicates:
            - Path=/api/v1/accounts/**

        - id: transfer-service
          uri: http://transfer-service:8083
          predicates:
            - Path=/api/v1/transfer/**

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:supersecretkeyprojectfera0903200414032026}