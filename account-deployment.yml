apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: fintech
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: account-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: fintech-config
            - secretRef:
                name: fintech-secret

---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: fintech
spec:
  selector:
    app: account-service
  ports:
    - port: 8082
      targetPort: 8082