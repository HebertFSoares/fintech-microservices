apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: fintech
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: fintech-config
            - secretRef:
                name: fintech-secret

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: fintech
spec:
  selector:
    app: notification-service
  ports:
    - port: 8085
      targetPort: 8085